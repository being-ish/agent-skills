<!--
  task-list Artifact 汎用テンプレ。この skeleton をコピーし、中身を対象タスクに合わせて差し替える。

  - フェイズ数や項目は固定でなく、対象タスクに合わせて組む
  - 特定タスク固有のフェイズ名や項目をこのファイルに直接書かない。コピーした側で差し替える

  構成部品
  - .purpose タイトル直下の 1 段落。このタスクリストが何のためにあるかを書く。現在地や進捗は書かず、状態はレールとチップに任せる
  - .rail   上部のフェイズ一覧。ドットを線でつないだステッパーで、各フェイズへのアンカー
    - ドットは未着手が番号、進行中が塗りつぶしに番号、完了が緑に✓
    - 名前は短縮形でよい。正式名はフェイズカード側に書く
    - 折り返さず、フェイズが多いときは横スクロールになる
  - .phase  フェイズカード。.exit と .phase-note を持てる
  - .chip   フェイズ状態のピル
  - .task   1 項目
    - 左の .box は完了で class="box done" にすると緑の✓
    - 右の .task-body は先頭に .tnum 番号バッジ、任意で .why 補足
  - .prov   任意の注記ボックス
  - footer  任意。参照リンクなど

  .tnum はフェイズ内の並び順で 1 から振り、項目を足したり並べ替えたら振り直す。参照はフェイズ番号と組で行う。
-->
<title>__TITLE__</title>
<style>
  :root {
    color-scheme: light dark;

    --bg: #f4f5fa;
    --surface: #ffffff;
    --surface-2: #f7f8fc;
    --border: #e2e4ef;
    --border-strong: #cdd0e2;
    --ink: #1b1d2b;
    --ink-2: #3c3f54;
    --ink-3: #565973;
    --accent: #4b57c4;
    --accent-soft: #eceeffb0;
    --accent-line: #c3c9f0;

    --active: #b5730c;
    --active-soft: #f8eed9;
    --active-line: #ecd3a2;
    --todo: #6d7186;
    --todo-soft: #edeef4;
    --todo-line: #d7d9e4;
    --done: #1f8a70;
    --done-soft: #e2f2ec;
    --done-line: #a9d9c9;

    --mono: ui-monospace, "SF Mono", "SFMono-Regular", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101220;
      --surface: #191c2c;
      --surface-2: #1f2234;
      --border: #2c3049;
      --border-strong: #3a3f5c;
      --ink: #eceef7;
      --ink-2: #c6cadf;
      --ink-3: #a2a6be;
      --accent: #99a3f2;
      --accent-soft: #262a45;
      --accent-line: #3f4574;

      --active: #e0ab5b;
      --active-soft: #322611;
      --active-line: #5e4a22;
      --todo: #9296b0;
      --todo-soft: #23273b;
      --todo-line: #3a3f5c;
      --done: #5cc7a8;
      --done-soft: #16302a;
      --done-line: #2f5a4d;
    }
  }

  :root[data-theme="light"] {
    --bg: #f4f5fa; --surface: #ffffff; --surface-2: #f7f8fc; --border: #e2e4ef;
    --border-strong: #cdd0e2; --ink: #1b1d2b; --ink-2: #3c3f54; --ink-3: #565973;
    --accent: #4b57c4; --accent-soft: #eceeffb0; --accent-line: #c3c9f0;
    --active: #b5730c; --active-soft: #f8eed9; --active-line: #ecd3a2;
    --todo: #6d7186; --todo-soft: #edeef4; --todo-line: #d7d9e4;
    --done: #1f8a70; --done-soft: #e2f2ec; --done-line: #a9d9c9;
  }
  :root[data-theme="dark"] {
    --bg: #101220; --surface: #191c2c; --surface-2: #1f2234; --border: #2c3049;
    --border-strong: #3a3f5c; --ink: #eceef7; --ink-2: #c6cadf; --ink-3: #a2a6be;
    --accent: #99a3f2; --accent-soft: #262a45; --accent-line: #3f4574;
    --active: #e0ab5b; --active-soft: #322611; --active-line: #5e4a22;
    --todo: #9296b0; --todo-soft: #23273b; --todo-line: #3a3f5c;
    --done: #5cc7a8; --done-soft: #16302a; --done-line: #2f5a4d;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 60rem;
    margin: 0 auto;
    padding: clamp(1.5rem, 4vw, 4rem) clamp(1rem, 4vw, 2.5rem) 5rem;
  }

  .eyebrow {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 0.9rem;
  }

  h1 {
    font-size: clamp(1.7rem, 4.5vw, 2.5rem); line-height: 1.2; letter-spacing: -0.015em;
    text-wrap: balance; margin: 0 0 0.7rem; font-weight: 700;
  }

  .purpose { font-size: 1.05rem; color: var(--ink-2); margin: 0; max-width: 46rem; }
  .purpose code { font-family: var(--mono); font-size: 0.86em; color: var(--ink); }

  /* 上部のフェイズステッパー */
  .rail { display: flex; overflow-x: auto; margin: 2rem 0 2.6rem; padding: 0.2rem 0 0.5rem; }
  .rail a {
    flex: 1 0 7rem; min-width: 7rem; position: relative; text-decoration: none; color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem; padding: 0 0.4rem;
  }
  .rail a::before {
    content: ""; position: absolute; top: 0.8rem; left: 0; right: 0; height: 2px;
    background: var(--border-strong);
  }
  .rail a:first-child::before { left: 50%; }
  .rail a:last-child::before { right: 50%; }
  .rail a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rail .dot {
    position: relative; z-index: 1; width: 1.6rem; height: 1.6rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
    background: var(--surface); border: 2px solid var(--todo-line); color: var(--todo);
  }
  .rail .dot.done { background: var(--done); border-color: var(--done); color: #fff; }
  .rail .dot.active { background: var(--active); border-color: var(--active); color: #fff; }
  .rail .t {
    font-size: 0.78rem; font-weight: 600; line-height: 1.3; text-align: center;
    white-space: nowrap; color: var(--ink-2);
  }
  .rail a:hover .t { color: var(--ink); }

  /* フェイズ本体 */
  .phase {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.5rem clamp(1.1rem, 3vw, 1.9rem); margin-bottom: 1.4rem; scroll-margin-top: 1rem;
  }
  .phase-head { display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .phase-num { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); font-weight: 600; }
  .phase-head h2 { font-size: 1.22rem; letter-spacing: -0.01em; margin: 0; flex: 1 1 auto; }

  .exit {
    font-size: 0.85rem; color: var(--ink-2); margin: 0 0 1.1rem; padding: 0.5rem 0.8rem;
    background: var(--surface-2); border-radius: 8px; border: 1px solid var(--border);
  }
  .exit b { color: var(--accent); font-weight: 600; }

  .phase-note { color: var(--ink-2); font-size: 0.95rem; margin: 0 0 1.1rem; max-width: 47rem; }
  .phase-note code, .task code, .prov code {
    font-family: var(--mono); font-size: 0.85em; color: var(--ink);
    background: var(--surface-2); padding: 0.05em 0.35em; border-radius: 4px;
  }

  /* フェイズ状態ピル */
  .chip {
    display: inline-flex; align-items: center; gap: 0.4em; font-family: var(--mono);
    font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
    padding: 0.28em 0.7em; border-radius: 999px; border: 1px solid; white-space: nowrap;
  }
  .chip::before { content: ""; width: 0.5em; height: 0.5em; border-radius: 50%; background: currentColor; }
  .chip.active { color: var(--active); background: var(--active-soft); border-color: var(--active-line); }
  .chip.todo { color: var(--todo); background: var(--todo-soft); border-color: var(--todo-line); }
  .chip.done { color: var(--done); background: var(--done-soft); border-color: var(--done-line); }

  /* タスク */
  .tasks { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
  .task {
    display: grid; grid-template-columns: 1.4rem 1fr; gap: 0.7rem; align-items: start;
    padding: 0.7rem 0; border-top: 1px solid var(--border);
  }
  .task:first-child { border-top: none; }
  .box {
    margin-top: 0.2em; width: 1.15rem; height: 1.15rem; border-radius: 5px;
    border: 1.5px solid var(--border-strong); flex: none;
    display: flex; align-items: center; justify-content: center;
  }
  .box.done { background: var(--done); border-color: var(--done); }
  .box.done::after { content: "✓"; color: #fff; font-size: 0.82rem; font-weight: 700; line-height: 1; }
  .task-body { color: var(--ink); font-size: 0.97rem; }
  .tnum {
    font-family: var(--mono); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em;
    color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-line);
    padding: 0.05em 0.4em; border-radius: 5px; margin-right: 0.5em; vertical-align: 0.08em;
  }
  .task-body .why { display: block; color: var(--ink-2); font-size: 0.85rem; margin-top: 0.15rem; }

  /* 任意の注記ボックス */
  .prov {
    margin-top: 1.1rem; display: flex; gap: 0.6rem; padding: 0.85rem 1rem;
    background: var(--accent-soft); border: 1px solid var(--accent-line); border-radius: 9px;
    font-size: 0.88rem; color: var(--ink-2);
  }
  .prov .mk { color: var(--accent); font-family: var(--mono); flex: none; font-size: 0.78rem; }
  .prov b { color: var(--ink); font-weight: 600; }

  footer {
    margin-top: 2.5rem; padding-top: 1.3rem; border-top: 1px solid var(--border);
    font-size: 0.82rem; color: var(--ink-3); display: flex; flex-wrap: wrap; gap: 0.4rem 1.2rem;
  }
  footer code { font-family: var(--mono); color: var(--ink-2); }
</style>

<div class="wrap">
  <p class="eyebrow">__EYEBROW__</p>
  <h1>__H1__</h1>
  <p class="purpose">__PURPOSE__</p>

  <!-- フェイズが 1 つだけなら rail は省いてよい。完了したフェイズは <span class="dot done">✓</span> にする -->
  <nav class="rail">
    <a href="#p1"><span class="dot active">1</span><span class="t">__PHASE1_NAME__</span></a>
    <a href="#p2"><span class="dot">2</span><span class="t">__PHASE2_NAME__</span></a>
  </nav>

  <section class="phase" id="p1">
    <div class="phase-head">
      <span class="phase-num">01</span>
      <h2>__PHASE1_NAME__</h2>
      <span class="chip active">進行中</span>
    </div>
    <p class="exit"><b>完了条件</b> &nbsp;__このフェイズの完了条件__</p>
    <p class="phase-note">__補足があれば。無ければ省く__</p>

    <ul class="tasks">
      <li class="task">
        <span class="box done"></span>
        <span class="task-body"><span class="tnum">1</span>__完了済みタスク__
          <span class="why">__任意の補足__</span>
        </span>
      </li>
      <li class="task">
        <span class="box"></span>
        <span class="task-body"><span class="tnum">2</span>__未完タスク__</span>
      </li>
    </ul>
  </section>

  <section class="phase" id="p2">
    <div class="phase-head">
      <span class="phase-num">02</span>
      <h2>__PHASE2_NAME__</h2>
      <span class="chip todo">未着手</span>
    </div>
    <p class="exit"><b>完了条件</b> &nbsp;__このフェイズの完了条件__</p>
    <ul class="tasks">
      <li class="task"><span class="box"></span><span class="task-body"><span class="tnum">1</span>__タスク__</span></li>
    </ul>
  </section>

  <!-- 任意 -->
  <footer>
    <span>__参照__ <code>path/to/ref</code></span>
  </footer>
</div>
